<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Review Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #ccc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
header { background: #2d2d2d; padding: 8px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #444; flex-shrink: 0; }
header h1 { font-size: 16px; color: #fff; white-space: nowrap; }
header .folder-path { flex: 1; background: #3c3c3c; border: 1px solid #555; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 13px; }
header button { background: #4a6a8a; color: #fff; border: none; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
header button:hover { background: #5a7a9a; }
header .counter { color: #aaa; font-size: 13px; white-space: nowrap; }

/* Main layout */
.main { flex: 1; display: flex; overflow: hidden; }

/* Left panel: image list */
.left-panel { width: 220px; background: #252525; border-right: 1px solid #444; display: flex; flex-direction: column; flex-shrink: 0; }
.left-panel h3 { padding: 8px 12px; font-size: 13px; color: #aaa; border-bottom: 1px solid #333; }
.image-list { flex: 1; overflow-y: auto; }
.image-list .img-item { padding: 6px 12px; font-size: 12px; cursor: pointer; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
.image-list .img-item:hover { background: #333; }
.image-list .img-item.active { background: #4a6a8a; color: #fff; }
.image-list .img-item .ann-badge { background: #555; color: #ccc; padding: 1px 6px; border-radius: 8px; font-size: 11px; }
.image-list .img-item.has-memo .ann-badge { background: #c44; color: #fff; }

/* Center: overlay image */
.center-panel { flex: 1; display: flex; flex-direction: column; background: #1a1a1a; position: relative; }
.image-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
.image-container img { max-width: 100%; max-height: 100%; cursor: crosshair; user-select: none; }
.image-container .no-image { color: #666; font-size: 18px; }

/* Right panel: info + memo */
.right-panel { width: 300px; background: #252525; border-left: 1px solid #444; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }

.info-section, .memo-section, .memo-list-section { padding: 12px; border-bottom: 1px solid #333; }
.info-section h3, .memo-section h3, .memo-list-section h3 { font-size: 13px; color: #888; margin-bottom: 8px; }

.info-hint { color: #666; font-size: 13px; }
.info-category { font-size: 20px; font-weight: bold; color: #fff; margin: 6px 0; }

.info-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
.info-row label { font-size: 12px; color: #888; width: 80px; flex-shrink: 0; }
.info-row .value { font-family: 'Consolas', monospace; font-size: 13px; color: #fff; background: #3c3c3c; padding: 2px 8px; border-radius: 3px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.info-row .btn-copy { background: #555; color: #fff; border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
.info-row .btn-copy:hover { background: #666; }

/* Memo input */
.memo-section textarea { width: 100%; height: 70px; background: #3c3c3c; color: #fff; border: 1px solid #555; border-radius: 4px; padding: 8px; font-size: 13px; resize: vertical; }
.memo-section textarea:focus { outline: none; border-color: #4a6a8a; }
.memo-buttons { display: flex; gap: 6px; margin-top: 8px; }
.memo-buttons button { flex: 1; padding: 6px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
.btn-save { background: #4a7a4a; color: #fff; }
.btn-save:hover { background: #5a8a5a; }
.btn-delete { background: #7a4a4a; color: #fff; }
.btn-delete:hover { background: #8a5a5a; }

/* Memo list */
.memo-list { max-height: 300px; overflow-y: auto; }
.memo-item { padding: 6px 8px; font-size: 12px; cursor: pointer; border-bottom: 1px solid #2a2a2a; display: flex; gap: 6px; }
.memo-item:hover { background: #333; }
.memo-item .memo-cat { color: #888; white-space: nowrap; }
.memo-item .memo-text { color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.memo-count { color: #888; font-size: 12px; margin-top: 4px; }

/* Footer toolbar */
footer { background: #2d2d2d; padding: 6px 16px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #444; flex-shrink: 0; }
footer button { background: #444; color: #fff; border: none; padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
footer button:hover { background: #555; }
footer .btn-export { background: #4a6a8a; }
footer .btn-export:hover { background: #5a7a9a; }
footer label { color: #aaa; font-size: 13px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
footer input[type="checkbox"] { accent-color: #4a6a8a; }
footer .goto-group { display: flex; align-items: center; gap: 4px; }
footer .goto-group input { width: 60px; background: #3c3c3c; border: 1px solid #555; color: #fff; padding: 4px 6px; border-radius: 4px; font-size: 13px; text-align: center; }
footer .spacer { flex: 1; }

/* Browse dialog */
.overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.overlay.hidden { display: none; }
.dialog { background: #2d2d2d; border-radius: 8px; width: 500px; max-height: 70vh; display: flex; flex-direction: column; }
.dialog-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #444; }
.dialog-header h2 { font-size: 16px; color: #fff; }
.dialog-header button { background: none; border: none; color: #aaa; font-size: 22px; cursor: pointer; }
.dialog-path { padding: 8px 16px; font-size: 13px; color: #aaa; background: #252525; border-bottom: 1px solid #333; word-break: break-all; }
.dialog-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.dialog-item { padding: 8px 16px; cursor: pointer; font-size: 14px; }
.dialog-item:hover { background: #3c3c3c; }
.dialog-footer { padding: 8px 16px; border-top: 1px solid #444; display: flex; justify-content: flex-end; gap: 8px; }
.dialog-footer button { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
.dialog-footer .btn-select { background: #4a7a4a; color: #fff; }
.dialog-footer .btn-cancel { background: #555; color: #fff; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #2a2a2a; }
::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #666; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <h1>Image Review</h1>
  <input type="text" class="folder-path" id="folderPath" placeholder="데이터셋 폴더를 선택하세요..." readonly>
  <button onclick="openBrowse()">Browse</button>
  <button onclick="loadDataset()">Load</button>
  <span class="counter" id="imgCounter">-</span>
</header>

<!-- Main -->
<div class="main">
  <!-- Left: Image list -->
  <div class="left-panel">
    <h3>이미지 목록</h3>
    <div class="image-list" id="imageList"></div>
  </div>

  <!-- Center: Overlay -->
  <div class="center-panel">
    <div class="image-container" id="imageContainer">
      <span class="no-image" id="noImageMsg">폴더를 로드하세요</span>
      <img id="overlayImg" style="display:none" onclick="onImageClick(event)">
    </div>
  </div>

  <!-- Right: Info + Memo -->
  <div class="right-panel">
    <div class="info-section">
      <h3>객체 정보</h3>
      <div class="info-hint" id="infoHint">이미지에서 객체를 클릭하세요</div>
      <div class="info-category" id="infoCategory"></div>
      <div class="info-row"><label>barcode</label><span class="value" id="valBarcode">-</span><button class="btn-copy" onclick="copyVal('valBarcode')">복사</button></div>
      <div class="info-row"><label>shipment_id</label><span class="value" id="valShipment">-</span><button class="btn-copy" onclick="copyVal('valShipment')">복사</button></div>
      <div class="info-row"><label>ann_id</label><span class="value" id="valAnnId">-</span><button class="btn-copy" onclick="copyVal('valAnnId')">복사</button></div>
      <div class="info-row"><label>category_id</label><span class="value" id="valCatId">-</span></div>
    </div>

    <div class="memo-section">
      <h3>오류 메모</h3>
      <textarea id="memoText" placeholder="오류 내용을 입력하세요..."></textarea>
      <div class="memo-buttons">
        <button class="btn-save" onclick="saveMemo()">저장</button>
        <button class="btn-delete" onclick="deleteMemo()">삭제</button>
      </div>
    </div>

    <div class="memo-list-section">
      <h3>메모 목록</h3>
      <div class="memo-list" id="memoList"></div>
      <div class="memo-count" id="memoCount">0 memos</div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <button onclick="navigate(-1)">&larr; Prev</button>
  <button onclick="navigate(1)">Next &rarr;</button>
  <div class="goto-group">
    <span style="color:#aaa;font-size:13px">Go to:</span>
    <input type="number" id="gotoInput" min="1" value="1" onkeydown="if(event.key==='Enter')gotoImage()">
  </div>
  <label><input type="checkbox" id="chkRoi" checked onchange="refreshOverlay()"> ROI</label>
  <div class="spacer"></div>
  <button class="btn-export" onclick="exportMemos()">Export XLSX</button>
</footer>

<!-- Browse Dialog -->
<div class="overlay hidden" id="browseOverlay">
  <div class="dialog">
    <div class="dialog-header">
      <h2>폴더 선택</h2>
      <button onclick="closeBrowse()">&times;</button>
    </div>
    <div class="dialog-path" id="browsePath">/</div>
    <div class="dialog-list" id="browseList"></div>
    <div class="dialog-footer">
      <button class="btn-cancel" onclick="closeBrowse()">취소</button>
      <button class="btn-select" id="btnSelectFolder" onclick="selectFolder()">선택</button>
    </div>
  </div>
</div>

<script>
// =====================================================================
// State
// =====================================================================
let images = [];
let currentIdx = -1;
let selectedAnn = null;   // {ann_id, image_id, category, ...}
let clickXY = null;       // for missing object mode
let allMemos = [];

// =====================================================================
// Browse dialog
// =====================================================================
let browseCurrent = '';
let browseHasAnnotation = false;

function openBrowse() {
  document.getElementById('browseOverlay').classList.remove('hidden');
  browseTo('');
}
function closeBrowse() {
  document.getElementById('browseOverlay').classList.add('hidden');
}

async function browseTo(path) {
  const res = await fetch('/api/browse?path=' + encodeURIComponent(path));
  const data = await res.json();
  if (data.error) return;
  browseCurrent = data.path || '';
  browseHasAnnotation = data.has_annotation;
  document.getElementById('browsePath').textContent = browseCurrent || '/';
  const list = document.getElementById('browseList');
  list.innerHTML = '';
  if (browseCurrent) {
    const up = document.createElement('div');
    up.className = 'dialog-item';
    up.textContent = '📁 ..';
    up.onclick = () => {
      const parent = browseCurrent.replace(/[/\\][^/\\]*$/, '') || '';
      browseTo(parent);
    };
    list.appendChild(up);
  }
  data.dirs.forEach(d => {
    const el = document.createElement('div');
    el.className = 'dialog-item';
    el.textContent = '📁 ' + d;
    el.onclick = () => browseTo(browseCurrent ? browseCurrent + '/' + d : d);
    list.appendChild(el);
  });
  document.getElementById('btnSelectFolder').disabled = false;
}

function selectFolder() {
  if (!browseCurrent) return;
  document.getElementById('folderPath').value = browseCurrent;
  closeBrowse();
}

// =====================================================================
// Load dataset
// =====================================================================
async function loadDataset() {
  const folder = document.getElementById('folderPath').value;
  if (!folder) return openBrowse();

  const res = await fetch('/api/load', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({folder})
  });
  const data = await res.json();
  if (data.error) { alert(data.error); return; }

  // Fetch image list
  const imgRes = await fetch('/api/images');
  images = await imgRes.json();
  if (!images.length) { alert('이미지가 없습니다.'); return; }

  allMemos = [];
  renderImageList();
  goToIndex(0);
}

// =====================================================================
// Image list
// =====================================================================
function renderImageList() {
  const list = document.getElementById('imageList');
  list.innerHTML = '';
  const memoImageIds = new Set(allMemos.map(m => m.image_id));

  images.forEach((img, i) => {
    const el = document.createElement('div');
    el.className = 'img-item' + (i === currentIdx ? ' active' : '');
    if (memoImageIds.has(img.image_id)) el.classList.add('has-memo');

    const name = document.createElement('span');
    name.textContent = img.file_name.length > 25
      ? '...' + img.file_name.slice(-25) : img.file_name;
    name.title = img.file_name;

    const badge = document.createElement('span');
    badge.className = 'ann-badge';
    badge.textContent = img.ann_count;

    el.appendChild(name);
    el.appendChild(badge);
    el.onclick = () => goToIndex(i);
    list.appendChild(el);
  });
}

function updateActiveItem() {
  const items = document.querySelectorAll('.img-item');
  items.forEach((el, i) => {
    el.classList.toggle('active', i === currentIdx);
  });
  // Scroll into view
  const active = document.querySelector('.img-item.active');
  if (active) active.scrollIntoView({block: 'nearest'});
}

// =====================================================================
// Navigation
// =====================================================================
function goToIndex(idx) {
  if (idx < 0 || idx >= images.length) return;
  currentIdx = idx;
  selectedAnn = null;
  clickXY = null;
  clearInfoPanel();
  refreshOverlay();
  updateActiveItem();
  updateCounter();
  document.getElementById('gotoInput').value = idx + 1;
  prefetchAdjacent(idx);
}

function prefetchAdjacent(idx) {
  const showRoi = document.getElementById('chkRoi').checked ? '1' : '0';
  for (const di of [1, -1, 2]) {
    const ni = idx + di;
    if (ni >= 0 && ni < images.length) {
      fetch(`/api/prefetch/${images[ni].image_id}?show_roi=${showRoi}`, {method: 'POST'});
    }
  }
}

function navigate(delta) {
  goToIndex(currentIdx + delta);
}

function gotoImage() {
  const val = parseInt(document.getElementById('gotoInput').value);
  if (!isNaN(val)) goToIndex(val - 1);
}

function updateCounter() {
  const el = document.getElementById('imgCounter');
  if (currentIdx >= 0 && images.length) {
    el.textContent = `${currentIdx + 1} / ${images.length}`;
  } else {
    el.textContent = '-';
  }
}

// =====================================================================
// Overlay image
// =====================================================================
function refreshOverlay() {
  if (currentIdx < 0 || !images.length) return;
  const img = images[currentIdx];
  const showRoi = document.getElementById('chkRoi').checked ? '1' : '0';
  const overlayImg = document.getElementById('overlayImg');
  const noMsg = document.getElementById('noImageMsg');

  overlayImg.style.display = 'none';
  noMsg.style.display = 'block';
  noMsg.textContent = '로딩 중...';

  const url = `/api/overlay/${img.image_id}?show_roi=${showRoi}&t=${Date.now()}`;
  const tempImg = new Image();
  tempImg.onload = () => {
    overlayImg.src = url;
    overlayImg.style.display = 'block';
    noMsg.style.display = 'none';
  };
  tempImg.onerror = () => {
    noMsg.textContent = '이미지를 불러올 수 없습니다';
  };
  tempImg.src = url;
}

// =====================================================================
// Click → Hit test
// =====================================================================
async function onImageClick(event) {
  if (currentIdx < 0) return;
  const imgEl = event.target;
  const rect = imgEl.getBoundingClientRect();

  // Map to original pixel coordinates
  const scaleX = imgEl.naturalWidth / imgEl.clientWidth;
  const scaleY = imgEl.naturalHeight / imgEl.clientHeight;
  const x = (event.clientX - rect.left) * scaleX;
  const y = (event.clientY - rect.top) * scaleY;

  const img = images[currentIdx];
  const res = await fetch('/api/hit_test', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({image_id: img.image_id, x, y})
  });
  const data = await res.json();

  if (data.hit) {
    selectedAnn = data;
    clickXY = null;
    showAnnotationInfo(data);
  } else {
    // Missing object mode
    selectedAnn = null;
    clickXY = {x: Math.round(x), y: Math.round(y)};
    showMissingMode(clickXY);
  }
}

// =====================================================================
// Info panel
// =====================================================================
function clearInfoPanel() {
  document.getElementById('infoHint').textContent = '이미지에서 객체를 클릭하세요';
  document.getElementById('infoCategory').textContent = '';
  document.getElementById('valBarcode').textContent = '-';
  document.getElementById('valShipment').textContent = '-';
  document.getElementById('valAnnId').textContent = '-';
  document.getElementById('valCatId').textContent = '-';
  document.getElementById('memoText').value = '';
}

function showAnnotationInfo(ann) {
  document.getElementById('infoHint').textContent = '';
  document.getElementById('infoCategory').textContent = ann.category;
  document.getElementById('valBarcode').textContent = ann.barcode || '-';
  document.getElementById('valShipment').textContent = ann.shipment_id || '-';
  document.getElementById('valAnnId').textContent = String(ann.ann_id);
  document.getElementById('valCatId').textContent = String(ann.category_id);
  document.getElementById('memoText').value = ann.memo || '';
}

function showMissingMode(xy) {
  document.getElementById('infoHint').textContent = `클릭: (${xy.x}, ${xy.y})`;
  document.getElementById('infoCategory').textContent = '(missing object)';
  document.getElementById('valBarcode').textContent = '-';
  document.getElementById('valShipment').textContent = '-';
  document.getElementById('valAnnId').textContent = '-';
  document.getElementById('valCatId').textContent = '-';
  document.getElementById('memoText').value = '';
}

function copyVal(elementId) {
  const text = document.getElementById(elementId).textContent;
  if (text && text !== '-') {
    navigator.clipboard.writeText(text);
  }
}

// =====================================================================
// Memo CRUD
// =====================================================================
async function saveMemo() {
  const text = document.getElementById('memoText').value.trim();
  if (!text) return alert('메모 내용을 입력하세요.');
  if (currentIdx < 0) return;
  const img = images[currentIdx];

  let body;
  if (selectedAnn) {
    body = {
      ann_id: selectedAnn.ann_id,
      image_id: img.image_id,
      text: text,
      type: 'annotation'
    };
  } else if (clickXY) {
    body = {
      image_id: img.image_id,
      text: text,
      x: clickXY.x,
      y: clickXY.y,
      type: 'missing'
    };
  } else {
    return alert('먼저 객체를 클릭하세요.');
  }

  const res = await fetch('/api/memo', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (data.error) { alert(data.error); return; }

  await refreshMemoList();
  refreshOverlay();
  renderImageList();
}

async function deleteMemo() {
  if (!selectedAnn) return;
  const res = await fetch(`/api/memo/${selectedAnn.ann_id}`, {method: 'DELETE'});
  const data = await res.json();
  document.getElementById('memoText').value = '';
  await refreshMemoList();
  refreshOverlay();
  renderImageList();
}

async function refreshMemoList() {
  const res = await fetch('/api/memos');
  allMemos = await res.json();

  const list = document.getElementById('memoList');
  list.innerHTML = '';
  const sorted = [...allMemos].sort((a, b) => (a.frame_index - b.frame_index) || (a.ann_id - b.ann_id));
  sorted.forEach(memo => {
    const el = document.createElement('div');
    el.className = 'memo-item';
    el.innerHTML = `<span class="memo-cat">[${memo.category}]</span><span class="memo-text">${escHtml(memo.text)}</span>`;
    el.title = `${memo.image_file}\n${memo.text}`;
    el.onclick = () => jumpToMemo(memo);
    list.appendChild(el);
  });
  document.getElementById('memoCount').textContent = `${allMemos.length} memos`;
}

function jumpToMemo(memo) {
  const idx = images.findIndex(img => img.image_id === memo.image_id);
  if (idx >= 0) goToIndex(idx);
}

// =====================================================================
// Export
// =====================================================================
async function exportMemos() {
  if (!allMemos.length) return alert('저장된 메모가 없습니다.');
  const res = await fetch('/api/export_memos', {method: 'POST'});
  if (!res.ok) { alert('Export 실패'); return; }
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `review_memos_${new Date().toISOString().slice(0,10)}.xlsx`;
  a.click();
  URL.revokeObjectURL(url);
}

// =====================================================================
// Keyboard
// =====================================================================
document.addEventListener('keydown', (e) => {
  // Don't intercept when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    if (e.key === 'Escape') e.target.blur();
    return;
  }
  if (e.key === 'ArrowLeft' || e.key === 'a') navigate(-1);
  else if (e.key === 'ArrowRight' || e.key === 'd') navigate(1);
});

// Ctrl+S to save memo
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveMemo();
  }
});

// =====================================================================
// Utils
// =====================================================================
function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
</body>
</html>
